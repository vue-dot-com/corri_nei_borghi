    <meta property="og:image" content="https://corrineiborghi.it/public/images/logos/corri-nei-borghi-oval.webp" />
    <meta property="og:url" content="https://corrineiborghi.it/media.html" />
    <meta property="og:type" content="website" />

    <title>Foto e Media - Corri nei Borghi</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="public/images/logos/favicon.ico"
    />
    <link rel="stylesheet" href="public/style/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap"
      rel="stylesheet"
      type="text/css"
    />
  </head>
  <body id="bootstrap-overrides">
    <!------>

    <div id="navbar"></div>

    <!------>

    <main role="main" class="container container-main mt-2">
      <div class="container col-xxl-10 px-3">
        <nav>
          <div class="nav nav-tabs" id="nav-tab" role="tablist"></div>
        </nav>

        <div class="tab-content" id="nav-tabContent">
          <div
            class="tab-pane fade show active"
            id="nav-home"
            role="tabpanel"
            aria-labelledby="nav-home-tab"
            tabindex="0"
          >
            <div
              id="cardContainer"
              class="card-container-media"
              style="display: flex"
            ></div>
          </div>
        </div>
        <!-- <div
          class="progress mt-5"
          role="progressbar"
          aria-label="Animated striped example"
          aria-valuenow="75"
          aria-valuemin="0"
          aria-valuemax="100"
        >
          <div
            class="progress-bar progress-bar-striped progress-bar-animated"
            style="width: 75%"
          >
            <span style="color: white"
              >Siamo quasi pronti...le foto le caricheremo qui!</span
            >
          </div>
        </div> -->
      </div>
    </main>

    <!---Sponsors-->
    <div id="sponsor"></div>

    <div id="footer"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="src/javascript/utils.js"></script>
    <script type="module">
      import constants from "./src/javascript/constants.js";
      const currentYear = constants.config.currentYear;
      // Call the fetch navbar
      fetchAndInsertNavbar("media");
      // Call other functions to insert components
      fetchAndInsertComponent("src/components/sponsor.html", "sponsor");
      fetchAndInsertComponent("src/components/footer.html", "footer");
      // Call function to generate year tabs
      generateYearsNavTabs(constants.tappe, currentYear, "nav-tab").then(() => {
        // Onclick event to generate media cards when changing tab
        const tabYearsArray = document.querySelectorAll("button.nav-link");
        tabYearsArray.forEach((tab) => {
          if (tab.id.includes("nav-home-tab-")) {
            tab.addEventListener("click", (e) => {
              generate(e.target.innerText);
            });
          }
        });
        function generate(year) {
          generateMediaCards(constants.tappe, year, "cardContainer");
        }
      });
      // Call function to generate media cards for current year
      generateMediaCards(constants.tappe, currentYear, "cardContainer");
    </script>
  </body>
</html>
